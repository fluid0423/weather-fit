name: Android Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build APK + AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (preview)
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait

          APK_URL=$(eas build:list \
            --platform android \
            --limit 1 \
            --status finished \
            --non-interactive \
            --json | jq -r '.[0].artifacts.buildUrl')

          curl -L "$APK_URL" -o weather-fit.apk

      - name: Build AAB (production)
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait

          AAB_URL=$(eas build:list \
            --platform android \
            --limit 1 \
            --status finished \
            --non-interactive \
            --json | jq -r '.[0].artifacts.buildUrl')

          curl -L "$AAB_URL" -o weather-fit.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weather-fit-${{ github.run_number }}
          path: |
            weather-fit.apk
            weather-fit.aab
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            커밋: ${{ github.sha }}
            브랜치: ${{ github.ref_name }}
            - APK: 테스트용 (직접 설치)
            - AAB: Play Store 제출용
          files: |
            weather-fit.apk
            weather-fit.aab
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
