name: Android APK Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (EAS Cloud)
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait

          APK_URL=$(eas build:list \
            --platform android \
            --limit 1 \
            --status finished \
            --non-interactive \
            --json | jq -r '.[0].artifacts.buildUrl')

          echo "APK_URL=$APK_URL"
          curl -L "$APK_URL" -o weather-fit.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-fit-${{ github.run_number }}
          path: weather-fit.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            커밋: ${{ github.sha }}
            브랜치: ${{ github.ref_name }}
          files: weather-fit.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
